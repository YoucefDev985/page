<!DOCTYPE html>
<html lang="de" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Meine eigene kleine Aufgabenliste. Einfach mal alles aufschreiben." />
  <title>Meine Aufgaben</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v20M2 12h20" />
        </svg>
        <span>Meine Aufgaben</span>
      </div>
      <button id="theme-toggle" class="icon-btn" aria-label="Modus wechseln">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <section class="add-task-section">
      <form id="task-form" class="task-form" novalidate>
        <div class="form-row">
          <div class="input-group">
            <input type="text" id="task-input" class="task-input" placeholder="Was steht an?..." maxlength="200"
              autocomplete="off" required />
          </div>
          <div class="input-group date-group">
            <input type="date" id="task-date" class="task-date" />
          </div>
          <button type="submit" id="add-btn" class="btn btn-primary">
            <span>Rein damit</span>
          </button>
        </div>
        <div id="input-error" class="input-error"></div>
      </form>
    </section>

    <section class="controls-section">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="search" id="search-input" class="search-input" placeholder="Suchen..." autocomplete="off" />
        <button id="clear-search" class="clear-search-btn hidden">✕</button>
      </div>
      <nav class="filter-tabs">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="active">Noch offen</button>
        <button class="filter-btn" data-filter="completed">Erledigt</button>
      </nav>
    </section>

    <section class="stats-section">
      <div class="stat-card">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Insgesamt</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-active">0</span>
        <span class="stat-label">Offen</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-done">0</span>
        <span class="stat-label">Fertig</span>
      </div>
    </section>

    <section class="task-list-section">
      <ul id="task-list" class="task-list"></ul>
      <div id="empty-state" class="empty-state hidden">
        <p id="empty-message">Alles leer hier.</p>
        <span id="empty-hint">Schreib doch oben mal was rein.</span>
      </div>
    </section>

    <div class="bulk-actions" id="bulk-actions">
      <button id="clear-completed-btn" class="btn btn-ghost">Fertige löschen</button>
      <button id="clear-all-btn" class="btn btn-danger">Alles wegwerfen</button>
    </div>
  </main>

  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal-title">Echt jetzt?</h2>
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Lieber nicht</button>
        <button id="modal-confirm" class="btn btn-danger">Ja, weg damit!</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
